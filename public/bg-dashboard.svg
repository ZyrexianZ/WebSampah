<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sunset" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8c4b"/>
      <stop offset="40%" stop-color="#ffb56b"/>
      <stop offset="72%" stop-color="#c07bdb"/>
      <stop offset="100%" stop-color="#6c5ab8"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#sunset)"/>

  <!-- soft light blooms -->
  <circle cx="220" cy="140" r="180" fill="#ffd28f" opacity="0.20"/>
  <circle cx="1380" cy="170" r="200" fill="#ffa77b" opacity="0.16"/>

