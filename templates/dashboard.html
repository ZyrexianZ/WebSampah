<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-pE6Vj+yXAvDXk1t2X9rE0B4Nl+6Ch4Ya2+VqvDvCpsZQ0V2pKQW3x4Jk6nOxUQx5jEJ0sagUz3YQ0fFZXxCI5w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body {
            background: linear-gradient(rgba(10,10,10,0.35), rgba(10,10,10,0.35)), url('/background.png') no-repeat center center fixed;
            background-size: cover;
            background-color: #111;
            color: #ffffff;
            min-height:100vh;
        }
        .flash-wrap {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: min(92vw, 520px);
        }
        h1, h2, h3, h4, h5, h6, p, label {
            color: #ffffff !important;
        }
        .card {
            border: none;
            border-radius: 1rem;
            background: rgba(33,33,33,0.95);
        }
        .card input.form-control, .card select.form-select {
            background: #1e1e1e;
            color: white;
            border: 1px solid #444;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card input::placeholder {
            color: white !important;
            opacity: 1;
        }
        .card .form-floating label {
            color: #bbb;
        }
        .jenis-dropdown {
            border: 1px solid #444 !important;
        }
        .input-bordered {
            border: 1px solid #444 !important;
        }
        a.btn-danger {
            background-color: #b71c1c;
            border-color: #b71c1c;
        }
        a.btn-danger:hover {
            background-color: #c62828;
            border-color: #c62828;
        }
        a.btn-success {
            background-color: #388e3c;
            border-color: #388e3c;
        }
        a.btn-success:hover {
            background-color: #2e7d32;
            border-color: #2e7d32;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="flash-wrap">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger mb-2">{{ message }}</div>
                {% endfor %}
             {% endif %}
      {% endwith %}
    </div>

<div class="container mt-5">

    <div class="d-flex justify-content-between">
        <h3>Halo, {{ user }}</h3>
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>

    <div class="card p-4 shadow mt-3">
        <h5>Total Poin Anda:</h5>
        <h2 class="text-success">{{ total_poin }}</h2>
    </div>

    <div class="card p-4 shadow mt-4">
        <h4>Sampah yang anda masukkan</h4>
        <br>
        <h5> Jenis Sampah :</h5>
        <form method="POST" action="/dashboard" enctype="multipart/form-data">
            <select name="jenis" class="form-select mb-3 jenis-dropdown">
                {% for j in jenis_list %}
                <option value="{{ j }}">{{ j }}</option>
                {% endfor %}
            </select>
        <br>
        <h5>Berat sampah (Kg) :</h5>
            <input type="number" step="0.1" name="kg" class="form-control mb-3 input-bordered" placeholder="Jumlah (kg)" required>
        <br>
        <h5>Foto sampah :</h5>
            <input type="file" name="foto" class="form-control mb-3 input-bordered" required>


            <button class="btn btn-success">Simpan</button>
        </form>
    </div>
</div>  

</body>
</html>
