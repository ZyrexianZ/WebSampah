<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Masuk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-pE6Vj+yXAvDXk1t2X9rE0B4Nl+6Ch4Ya2+VqvDvCpsZQ0V2pKQW3x4Jk6nOxUQx5jEJ0sagUz3YQ0fFZXxCI5w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
      :root {
          --base-font-size: clamp(15px, 0.35vw + 13px, 17px);
      }
      html {
          font-size: var(--base-font-size);
          -webkit-text-size-adjust: 100%;
          text-size-adjust: 100%;
      }
      body {
          margin: 0;
          background: linear-gradient(rgba(10,10,10,0.35), rgba(10,10,10,0.35)), url('/background.png') no-repeat center center fixed;
          background-size: cover;
          background-color: #111;
          color: #e0e0e0;
          min-height: 100vh;
          overflow-x: hidden;
      }
      .page-wrap {
          width: min(92vw, 560px);
          padding-inline: clamp(10px, 2.5vw, 20px);
      }
      .flash-wrap {
          position: fixed;
          top: 20px;
          left: 50%;
          transform: translateX(-50%);
          z-index: 1000;
          width: min(92vw, 520px);
      }
      .card {
          border: none;
          border-radius: 1rem;
          background: rgba(33,33,33,0.95);
          padding: clamp(1rem, 2vw, 1.6rem) !important;
      }
      .submit-btn:disabled {
          opacity: 0.75;
          cursor: not-allowed;
      }
      .card input.form-control {
          background: #1e1e1e;
          color: white;
          border: 1px solid #444;
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
      .card .form-floating label {
          color: #bbb;
      }
      .logo {
          width: 80px;
          height: 80px;
          border-radius: 50%;
          background: radial-gradient(circle at 30% 30%, #9be15d 0%, #2e7d32 70%);
          box-shadow: 0 8px 16px rgba(0,0,0,0.35);
          margin: 0 auto 20px;
      }
      input::placeholder {
          color: white !important;
      }
      a.btn-success {
          background-color: #388e3c;
          border-color: #388e3c;
      }
      a.btn-success:hover {
          background-color: #2e7d32;
          border-color: #2e7d32;
      }
      @media (max-width: 576px) {
          .flash-wrap {
              top: 12px;
              width: calc(100vw - 24px);
          }
      }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

  <div class="flash-wrap">
      {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                  {% for category, message in messages %}
                      <div class="alert alert-{{ category if category in ['success', 'danger', 'warning', 'info'] else 'info' }} mb-2">{{ message }}</div>
                  {% endfor %}
              {% endif %}
      {% endwith %}
  </div>
<div class="container page-wrap">
    <div class="card p-4 shadow-lg">
        <div class="logo"></div>
        <h3 class="text-center mb-4 text-white">Selamat Datang Kembali</h3>
        <form method="POST" action="/" class="auto-loading-form">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="username" name="username" placeholder="Nama Pengguna" autocomplete="username" required>
            </div>
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password" name="password" placeholder="Kata Sandi" autocomplete="current-password" required>
            </div>
            <button class="btn btn-primary w-100 submit-btn"><i class="fa fa-sign-in-alt"></i> Masuk</button>
        </form>
    </div>
    <div class="text-center mt-3">
        <a href="/register" class="btn btn-success">Buat Akun</a>
    </div>
</div>

</body>
<script>
  document.querySelectorAll(".auto-loading-form").forEach((form) => {
    form.addEventListener("submit", () => {
      const btn = form.querySelector(".submit-btn");
      if (!btn) return;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Memproses...';
    });
  });
</script>
</html>
