<!DOCTYPE html>
<html>
<head>
    <title>Masuk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-pE6Vj+yXAvDXk1t2X9rE0B4Nl+6Ch4Ya2+VqvDvCpsZQ0V2pKQW3x4Jk6nOxUQx5jEJ0sagUz3YQ0fFZXxCI5w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
      body {
          background: url('/background.png') no-repeat center center fixed;
          background-size: cover;
          color: #e0e0e0;
          min-height:100vh;
      }
      .card {
          border: none;
          border-radius: 1rem;
          background: rgba(33,33,33,0.95);
      }
      .card input.form-control {
          background: #1e1e1e;
          color: white;
          border: 1px solid #444;
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
      .card .form-floating label {
          color: #bbb;
      }
      .logo {
          width: 80px;
          height: 80px;
          border-radius: 50%;
          background: radial-gradient(circle at 30% 30%, #9be15d 0%, #2e7d32 70%);
          box-shadow: 0 8px 16px rgba(0,0,0,0.35);
          margin: 0 auto 20px;
      }
      input::placeholder {
          color: white !important;
      }
      a.btn-success {
          background-color: #388e3c;
          border-color: #388e3c;
      }
      a.btn-success:hover {
          background-color: #2e7d32;
          border-color: #2e7d32;
      }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

  {% with messages = get_flashed_messages() %}
          {% if messages %}
              {% for message in messages %}
                  <div class="alert alert-danger">{{ message }}</div>
              {% endfor %}
          {% endif %}
  {% endwith %}
<div class="container">
    <div class="card p-4 shadow-lg">
        <div class="logo"></div>
        <h3 class="text-center mb-4 text-white">Selamat Datang Kembali</h3>
        <form method="POST" action="/">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="username" name="username" placeholder="Nama Pengguna" required>
            </div>
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password" name="password" placeholder="Kata Sandi" required>
            </div>
            <button class="btn btn-primary w-100"><i class="fa fa-sign-in-alt"></i> Masuk</button>
        </form>
    </div>
    <div class="text-center mt-3">
        <a href="/register" class="btn btn-success">Buat Akun</a>
    </div>
</div>


</body>
</html>
